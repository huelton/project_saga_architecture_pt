# Prometheus - coleta de métricas (ARCHITECTURE.md)
# Métricas: taxa de sucesso de transferências, latência por etapa, taxa de compensação,
# circuit breaker states, throughput de mensagens Kafka.
# Os serviços Spring Boot devem expor /actuator/prometheus (management.endpoints.web.exposure.include=prometheus).

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  # Microsserviços SAGA (rodar na máquina host; usar host.docker.internal no Docker)
  - job_name: saga-orchestrator
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [host.docker.internal:8083]
  - job_name: account-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [host.docker.internal:8084]
  - job_name: validation-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [host.docker.internal:8085]
  - job_name: currency-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [host.docker.internal:8086]
  - job_name: transaction-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [host.docker.internal:8087]
  - job_name: notification-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [host.docker.internal:8088]
  - job_name: audit-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [host.docker.internal:8089]
