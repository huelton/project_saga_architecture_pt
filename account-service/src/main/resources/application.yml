server:
  port: 8084

spring:
  application:
    name: account-service
  datasource:
    url: jdbc:postgresql://localhost:5432/meubanco
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
  kafka:
    bootstrap-servers: localhost:29092
    consumer:
      group-id: account-service-group
      auto-offset-reset: earliest
