server:
  port: 8087

spring:
  application:
    name: transaction-service
  datasource:
    url: jdbc:postgresql://localhost:5432/meubanco
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
  kafka:
    bootstrap-servers: localhost:29092
    consumer:
      group-id: transaction-service-group
      auto-offset-reset: earliest
